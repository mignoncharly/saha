name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Django tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: System checks
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
      - name: Tests (isolated sqlite / locmem / eager Celery)
        run: python manage.py test --verbosity 2
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

  frontend:
    name: Frontend (type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # No ESLint config in the repo; tsc is the configured type/correctness gate.
      - run: npx tsc --noEmit

  repo-hygiene:
    name: Repo hygiene (no secrets / artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No tracked secrets or runtime artifacts
        run: |
          set -euo pipefail
          bad=$(git ls-files | grep -E '(^|/)\.env$|deploy/\.secrets\.json|deploy/redis-data/|\.rdb$|\.pid$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Tracked sensitive/runtime files found:"; echo "$bad"; exit 1
          fi
          echo "OK: no tracked secrets or runtime artifacts."
      - name: Secret scan (gitleaks, native binary)
        run: |
          set -euo pipefail
          version=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          # Scan the checked-out tree (tracked files only; no installed deps here).
          ./gitleaks detect --no-git --no-banner --redact --exit-code 1 --source .
