version: '3.9'

# Shared configuration for all Django/Celery services (same image + environment).
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: unless-stopped
  volumes:
    - ./backend:/app
    - media_data:/app/media
  environment:
    - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
    - SECRET_KEY=${SECRET_KEY}
    - DEBUG=${DEBUG}
    - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=${REDIS_URL}
    - EMAIL_BACKEND=${EMAIL_BACKEND}
    - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
    - VAPID_CLAIMS_EMAIL=${VAPID_CLAIMS_EMAIL}
    - MEDIA_ROOT=${MEDIA_ROOT}
    - MEDIA_URL=${MEDIA_URL}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: stl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-common
    container_name: stl-backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"

  celery-worker:
    <<: *backend-common
    container_name: stl-celery-worker
    command: celery -A config worker -l info

  celery-beat:
    <<: *backend-common
    container_name: stl-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stl-frontend
    restart: unless-stopped
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER}
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
