<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A2540">
  <title>STL — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 1.5rem;
      background: linear-gradient(135deg, #0D47A1, #0A2540);
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(6px);
      padding: 2.5rem 2rem; border-radius: 20px;
      text-align: center; max-width: 24rem; width: 100%;
      box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.3);
    }
    .logo {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.1); margin-bottom: 1.25rem;
      font-size: 1.75rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #c7d6ee; line-height: 1.6; font-size: 0.95rem; }
    button {
      margin-top: 1.75rem; padding: 0.75rem 1.5rem;
      background: #C62828; color: #fff; border: none;
      border-radius: 10px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #a91f1f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📦</div>
    <h1 id="offline-title"></h1>
    <p id="offline-message"></p>
    <button id="retry" onclick="location.reload()"></button>
  </div>
  <script>
    const locale = localStorage.getItem('stl-locale') || (document.cookie.match(/(?:^|; )stl-locale=([^;]+)/) || [])[1] || navigator.language;
    const de = String(locale).toLowerCase().startsWith('de');
    document.documentElement.lang = de ? 'de' : 'fr';
    document.title = de ? 'STL — Offline' : 'STL — Hors ligne';
    document.getElementById('offline-title').textContent = de ? 'Sie sind offline' : 'Vous êtes hors ligne';
    document.getElementById('offline-message').textContent = de
      ? 'SAHA Transport & Logistics kann nicht geladen werden. Prüfen Sie Ihre Internetverbindung und versuchen Sie es erneut.'
      : 'Impossible de charger SAHA Transport & Logistics. Vérifiez votre connexion internet, puis réessayez.';
    document.getElementById('retry').textContent = de ? 'Erneut versuchen' : 'Réessayer';
  </script>
</body>
</html>
